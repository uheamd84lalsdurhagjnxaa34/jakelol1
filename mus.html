<script>
/**
 * Music Player Application
 *
 * Features:
 * - Play/Pause, Next/Previous, Seek, Volume
 * - Shuffle, Repeat (off/one/all)
 * - Browse by Songs, Artists, Albums
 * - Queue management
 * - Search functionality
 * - Keyboard shortcuts
 */

(function() {
    'use strict';

    // ========================================
    // State
    // ========================================
    const state = {
        library: null,           // Full library data
        tracksById: {},          // Quick lookup by track ID
        albumsById: {},          // Quick lookup by album ID
        artistsById: {},         // Quick lookup by artist ID

        currentView: 'songs',    // Current view: songs, artists, albums, queue, artist-detail, album-detail, radio
        viewHistory: [],         // Navigation history

        queue: [],               // Array of track IDs
        queueIndex: -1,          // Current position in queue
        currentTrack: null,      // Currently playing track object

        isPlaying: false,
        shuffle: false,
        repeat: 'off',           // off, one, all
        volume: 1,
        muted: false,

        searchQuery: '',
        searchResults: null,

        playlists: [],
        playlistsById: {},
        playlistSource: 'local', // local | account
        isLoggedIn: false,
        pendingPlaylistTrackId: null,

        // Radio state
        currentRadio: null,      // Currently playing radio station
        isRadioMode: false       // True when playing radio vs library
    };

    // Houston Radio Stations
    const radioStations = [
        {
            id: 'kqbt',
            name: '93.7 The Beat',
            frequency: '93.7 FM',
            format: 'Hip-Hop/R&B',
            city: 'Houston',
            streamUrl: 'https://stream.revma.ihrhls.com/zc1465',
            logo: 'music-art/radio/thebeat.svg'
        },
        {

            name: 'KRBE 104.1',
            frequency: '104.1 FM',
            format: 'Top 40/Pop',
            city: 'Houston',
            streamUrl: 'https://stream.revma.ihrhls.com/zc1461',
            logo: 'music-art/radio/krbe.svg'
        },
        {
            id: 'kbxx',
            name: '97.9 The Box',
            frequency: '97.9 FM',
            format: 'Hip-Hop',
            city: 'Houston',
            streamUrl: 'https://stream.revma.ihrhls.com/zc1469',
            logo: 'music-art/radio/thebox.svg'
        },
        {
            id: 'ktbz',
            name: '94.5 The Buzz',
            frequency: '94.5 FM',
            format: 'Alternative Rock',
            city: 'Houston',
            streamUrl: 'https://stream.revma.ihrhls.com/zc1457',
            logo: 'music-art/radio/thebuzz.svg'
        },
        {
            id: 'kmjq',
            name: 'Majic 102.1',
            frequency: '102.1 FM',
            format: 'R&B/Soul',
            city: 'Houston',
            streamUrl: 'https://stream.revma.ihrhls.com/zc1473',
            logo: 'music-art/radio/majic.svg'
        },
        {
            id: 'kkhh',
            name: '95.7 The Spot',
            frequency: '95.7 FM',
            format: 'Classic Hip-Hop',
            city: 'Houston',
            streamUrl: 'https://stream.revma.ihrhls.com/zc1477',
            logo: 'music-art/radio/thespot.svg'
        }
    ];

    // ========================================
    // DOM Elements
    // ========================================
    const API_BASE = '/apiv2';
    const elements = {};

    function cacheElements() {
        elements.audio = document.getElementById('audio-player');
        elements.viewContainer = document.getElementById('view-container');

        // Navigation
        elements.navItems = document.querySelectorAll('.nav-item[data-view]');
        elements.mobileNavItems = document.querySelectorAll('.mobile-nav-item[data-view]');
        elements.queueCount = document.getElementById('queue-count');
        elements.sidebarStats = document.getElementById('sidebar-stats');

        // Search
        elements.searchInput = document.getElementById('search-input');
        elements.searchClear = document.getElementById('search-clear');

        // Now playing
        elements.nowPlayingArt = document.getElementById('now-playing-art');
        elements.nowPlayingTitle = document.getElementById('now-playing-title');
        elements.nowPlayingArtist = document.getElementById('now-playing-artist');

        // Controls
        elements.btnPlay = document.getElementById('btn-play');
        elements.btnPrev = document.getElementById('btn-prev');
        elements.btnNext = document.getElementById('btn-next');
        elements.btnShuffle = document.getElementById('btn-shuffle');
        elements.btnRepeat = document.getElementById('btn-repeat');
        elements.btnQueue = document.getElementById('btn-queue');
        elements.btnVolume = document.getElementById('btn-volume');

        // Progress
        elements.progressBar = document.getElementById('progress-bar');
        elements.progressFill = document.getElementById('progress-fill');
        elements.progressHandle = document.getElementById('progress-handle');
        elements.timeCurrent = document.getElementById('time-current');
        elements.timeTotal = document.getElementById('time-total');

        // Volume
        elements.volumeSlider = document.getElementById('volume-slider');
        elements.volumeFill = document.getElementById('volume-fill');
        elements.volumeHandle = document.getElementById('volume-handle');

        // Context menu
        elements.contextMenu = document.getElementById('context-menu');

        // Playlist modals
        elements.playlistModal = document.getElementById('playlist-modal');
        elements.playlistModalClose = document.getElementById('playlist-modal-close');
        elements.playlistCancel = document.getElementById('playlist-cancel-btn');
        elements.playlistCreate = document.getElementById('playlist-create-btn');
        elements.playlistName = document.getElementById('playlist-name');
        elements.playlistSyncNote = document.getElementById('playlist-sync-note');

        elements.playlistPicker = document.getElementById('playlist-picker');
        elements.playlistPickerClose = document.getElementById('playlist-picker-close');
        elements.playlistPickerList = document.getElementById('playlist-picker-list');
        elements.playlistNewBtn = document.getElementById('playlist-new-btn');

    }

    // ========================================
    // Initialization
    // ========================================
    async function init() {
        cacheElements();
        setupEventListeners();
        loadSavedState();
        await Promise.all([
            loadLibrary(),
            loadPlaylists()
        ]);
        renderView();
    }

    async function loadLibrary() {
        try {
            const response = await fetch('music-library.json');
            if (!response.ok) throw new Error('Failed to load library');

            state.library = await response.json();

            // Build lookup maps
            state.library.tracks.forEach(track => {
                state.tracksById[track.id] = track;
            });
            state.library.albums.forEach(album => {
                state.albumsById[album.id] = album;
            });
            state.library.artists.forEach(artist => {
                state.artistsById[artist.id] = artist;
            });

            // Update stats in sidebar
            updateSidebarStats();

        } catch (err) {
            console.error('Failed to load library:', err);
            elements.viewContainer.innerHTML = `
                <div class="loading-spinner">
                    <p style="color: #ff6b6b;">Failed to load music library</p>
                    <p style="font-size: 12px; margin-top: 8px;">Make sure music-library.json exists</p>
                </div>
            `;
        }
    }

    function loadSavedState() {
        try {
            const saved = localStorage.getItem('musicPlayerState');
            if (saved) {
                const data = JSON.parse(saved);
                state.volume = data.volume ?? 1;
                state.shuffle = data.shuffle ?? false;
                state.repeat = data.repeat ?? 'off';
                state.muted = data.muted ?? false;
            }
        } catch (e) {
            // Ignore
        }

        // Apply volume
        elements.audio.volume = state.muted ? 0 : state.volume;
        updateVolumeUI();
        updateShuffleUI();
        updateRepeatUI();
    }

    function saveState() {
        try {
            localStorage.setItem('musicPlayerState', JSON.stringify({
                volume: state.volume,
                shuffle: state.shuffle,
                repeat: state.repeat,
                muted: state.muted
            }));
        } catch (e) {
            // Ignore
        }
    }

    function updateSidebarStats() {
        if (!state.library) return;

        const stats = state.library.stats;
        const totalDuration = formatDurationLong(stats.totalDuration);

        elements.sidebarStats.innerHTML = `
            <div>${stats.totalTracks.toLocaleString()} songs</div>
            <div>${stats.totalAlbums} albums</div>
            <div>${stats.totalArtists} artists</div>
            <div>${totalDuration}</div>
        `;
    }

    // ========================================
    // Playlists
    // ========================================
    async function loadPlaylists() {
        const serverPlaylists = await fetchAccountPlaylists();
        if (serverPlaylists) {
            state.isLoggedIn = true;
            state.playlistSource = 'account';
            state.playlists = serverPlaylists;
        } else {
            state.isLoggedIn = false;
            state.playlistSource = 'local';
            state.playlists = loadLocalPlaylists();
        }
        indexPlaylists();
    }

    function indexPlaylists() {
        state.playlistsById = {};
        state.playlists.forEach(playlist => {
            state.playlistsById[playlist.id] = playlist;
        });
    }

    async function fetchAccountPlaylists() {
        try {
            const res = await apiFetch('/music/playlists');
            if (!res.ok) return null;
            const data = await res.json();
            return (data.playlists || []).map(p => ({
                id: p.id,
                name: p.name,
                trackIds: p.trackIds || null,
                trackCount: p.trackCount ?? 0,
                updatedAt: p.updatedAt
            }));
        } catch (err) {
            return null;
        }
    }

    function loadLocalPlaylists() {
        try {
            const raw = localStorage.getItem('musicPlaylistsLocal');
            const parsed = raw ? JSON.parse(raw) : [];
            if (!Array.isArray(parsed)) return [];
            return parsed.map(p => ({
                id: p.id,
                name: p.name,
                trackIds: Array.isArray(p.trackIds) ? p.trackIds : [],
                trackCount: Array.isArray(p.trackIds) ? p.trackIds.length : 0,
                updatedAt: p.updatedAt || Date.now()
            }));
        } catch (e) {
            return [];
        }
    }

    function saveLocalPlaylists() {
        const payload = state.playlists.map(p => ({
            id: p.id,
            name: p.name,
            trackIds: p.trackIds || [],
            updatedAt: p.updatedAt || Date.now()
        }));
        localStorage.setItem('musicPlaylistsLocal', JSON.stringify(payload));
    }

    async function ensurePlaylistLoaded(playlistId) {
        const playlist = state.playlistsById[playlistId];
        if (!playlist || playlist.trackIds) return playlist;
        if (state.playlistSource !== 'account') return playlist;
        try {
            const res = await apiFetch(`/music/playlists/${playlistId}`);
            if (!res.ok) return playlist;
            const data = await res.json();
            playlist.trackIds = data.trackIds || [];
            playlist.trackCount = playlist.trackIds.length;
            playlist.updatedAt = data.updatedAt || playlist.updatedAt;
        } catch (err) {
            return playlist;
        }
        return playlist;
    }

    async function createPlaylist(name, trackIds = []) {
        const trimmed = (name || '').trim();
        if (!trimmed) return;
        if (state.playlistSource === 'account' && state.isLoggedIn) {
            const res = await apiFetch('/music/playlists', {
                method: 'POST',
                body: JSON.stringify({name: trimmed})
            });
            if (!res.ok) return;
            const data = await res.json();
            const playlist = {
                id: data.id,
                name: data.name,
                trackIds: [],
                trackCount: 0,
                updatedAt: data.updatedAt
            };
            if (trackIds.length > 0) {
                playlist.trackIds = [...trackIds];
                playlist.trackCount = playlist.trackIds.length;
                await savePlaylistTracks(playlist.id, playlist.trackIds);
            }
            state.playlists.unshift(playlist);
            indexPlaylists();
        } else {
            const playlist = {
                id: `local-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
                name: trimmed,
                trackIds: [...trackIds],
                trackCount: trackIds.length,
                updatedAt: Date.now()
            };
            state.playlists.unshift(playlist);
            indexPlaylists();
            saveLocalPlaylists();
        }
        renderView();
    }

    async function renamePlaylist(playlistId, name) {
        const playlist = state.playlistsById[playlistId];
        if (!playlist) return;
        const trimmed = (name || '').trim();
        if (!trimmed) return;
        playlist.name = trimmed;
        playlist.updatedAt = Date.now();
        if (state.playlistSource === 'account' && state.isLoggedIn) {
            await apiFetch(`/music/playlists/${playlistId}`, {
                method: 'POST',
                body: JSON.stringify({name: trimmed})
            });
        } else {
            saveLocalPlaylists();
        }
        renderView();
    }

    async function deletePlaylist(playlistId) {
        const idx = state.playlists.findIndex(p => p.id === playlistId);
        if (idx === -1) return;
        state.playlists.splice(idx, 1);
        indexPlaylists();
        if (state.playlistSource === 'account' && state.isLoggedIn) {
            await apiFetch(`/music/playlists/${playlistId}/delete`, {method: 'POST'});
        } else {
            saveLocalPlaylists();
        }
        navigateTo('playlists');
    }

    async function addTrackToPlaylist(playlistId, trackId) {
        const playlist = state.playlistsById[playlistId];
        if (!playlist) return;
        await ensurePlaylistLoaded(playlistId);
        if (!playlist.trackIds) playlist.trackIds = [];
        if (playlist.trackIds.includes(trackId)) return;
        playlist.trackIds.push(trackId);
        playlist.trackCount = playlist.trackIds.length;
        playlist.updatedAt = Date.now();
        if (state.playlistSource === 'account' && state.isLoggedIn) {
            await savePlaylistTracks(playlistId, playlist.trackIds);
        } else {
            saveLocalPlaylists();
        }
        renderView();
    }

    async function savePlaylistTracks(playlistId, trackIds) {
        await apiFetch(`/music/playlists/${playlistId}/tracks`, {
            method: 'POST',
            body: JSON.stringify({tracks: trackIds})
        });
    }

    async function apiFetch(path, options = {}) {
        const opts = {
            method: options.method || 'GET',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include'
        };
        if (options.body) opts.body = options.body;
        return fetch(`${API_BASE}${path}`, opts);
    }

    // ========================================
    // Playlist Modal / Picker
    // ========================================
    function openPlaylistModal() {
        elements.playlistModal.classList.add('active');
        elements.playlistModal.setAttribute('aria-hidden', 'false');
        elements.playlistName.value = '';
        elements.playlistName.focus();

        // Show sync note
        if (state.isLoggedIn) {
            elements.playlistSyncNote.textContent = 'Playlist will sync to your EDUrocks account';
        } else {
            elements.playlistSyncNote.textContent = 'Sign in to sync playlists across devices';
        }
    }

    function closePlaylistModal() {
        elements.playlistModal.classList.remove('active');
        elements.playlistModal.setAttribute('aria-hidden', 'true');
    }

    async function handleCreatePlaylist() {
        const name = elements.playlistName.value.trim();
        if (!name) return;

        const trackId = state.pendingPlaylistTrackId;
        state.pendingPlaylistTrackId = null;

        await createPlaylist(name, trackId ? [trackId] : []);
        closePlaylistModal();
    }

    function openPlaylistPicker(trackId) {
        state.pendingPlaylistTrackId = trackId;

        // Render playlist list
        let html = '';
        if (state.playlists.length === 0) {
            html = '<p style="text-align:center;color:var(--text-tertiary);padding:16px;">No playlists yet</p>';
        } else {
            state.playlists.forEach(playlist => {
                html += `
                    <div class="playlist-picker-item" data-playlist-id="${playlist.id}">
                        <span>${escapeHtml(playlist.name)}</span>
                        <button data-action="add-to-this-playlist" data-playlist-id="${playlist.id}">Add</button>
                    </div>
                `;
            });
        }
        elements.playlistPickerList.innerHTML = html;

        // Add click handlers
        elements.playlistPickerList.querySelectorAll('[data-action="add-to-this-playlist"]').forEach(btn => {
            btn.addEventListener('click', async () => {
                const playlistId = btn.dataset.playlistId;
                await addTrackToPlaylist(playlistId, state.pendingPlaylistTrackId);
                state.pendingPlaylistTrackId = null;
                closePlaylistPicker();
            });
        });

        elements.playlistPicker.classList.add('active');
        elements.playlistPicker.setAttribute('aria-hidden', 'false');
    }

    function closePlaylistPicker() {
        elements.playlistPicker.classList.remove('active');
        elements.playlistPicker.setAttribute('aria-hidden', 'true');
        state.pendingPlaylistTrackId = null;
    }

    // ========================================
    // Event Listeners
    // ========================================
    function setupEventListeners() {
        // Navigation (desktop sidebar)
        elements.navItems.forEach(item => {
            item.addEventListener('click', () => {
                const view = item.dataset.view;
                navigateTo(view);
            });
        });

        // Navigation (mobile bottom nav)
        elements.mobileNavItems.forEach(item => {
            item.addEventListener('click', () => {
                const view = item.dataset.view;
                navigateTo(view);
            });
        });

        // Search
        elements.searchInput.addEventListener('input', debounce(handleSearch, 200));
        elements.searchClear.addEventListener('click', clearSearch);

        // Player controls
        elements.btnPlay.addEventListener('click', togglePlay);
        elements.btnPrev.addEventListener('click', playPrevious);
        elements.btnNext.addEventListener('click', playNext);
        elements.btnShuffle.addEventListener('click', toggleShuffle);
        elements.btnRepeat.addEventListener('click', toggleRepeat);
        elements.btnQueue.addEventListener('click', () => navigateTo('queue'));
        elements.btnVolume.addEventListener('click', toggleMute);

        // Progress bar
        elements.progressBar.addEventListener('click', handleProgressClick);
        setupDrag(elements.progressBar, handleProgressDrag);

        // Volume slider
        elements.volumeSlider.addEventListener('click', handleVolumeClick);
        setupDrag(elements.volumeSlider, handleVolumeDrag);

        // Audio events
        elements.audio.addEventListener('timeupdate', handleTimeUpdate);
        elements.audio.addEventListener('ended', handleTrackEnded);
        elements.audio.addEventListener('loadedmetadata', handleMetadataLoaded);
        elements.audio.addEventListener('play', () => { state.isPlaying = true; updatePlayButton(); });
        elements.audio.addEventListener('pause', () => { state.isPlaying = false; updatePlayButton(); });
        elements.audio.addEventListener('error', handleAudioError);

        // Context menu
        document.addEventListener('click', hideContextMenu);
        elements.contextMenu.addEventListener('click', handleContextMenuClick);

        // Keyboard shortcuts
        document.addEventListener('keydown', handleKeydown);

        // View container clicks (delegated)
        elements.viewContainer.addEventListener('click', handleViewClick);
        elements.viewContainer.addEventListener('contextmenu', handleContextMenu);

        // Playlist modals
        if (elements.playlistModalClose) elements.playlistModalClose.addEventListener('click', closePlaylistModal);
        if (elements.playlistCancel) elements.playlistCancel.addEventListener('click', closePlaylistModal);
        if (elements.playlistCreate) elements.playlistCreate.addEventListener('click', handleCreatePlaylist);
        if (elements.playlistModal) elements.playlistModal.addEventListener('click', (e) => {
            if (e.target === elements.playlistModal) closePlaylistModal();
        });

        if (elements.playlistPickerClose) elements.playlistPickerClose.addEventListener('click', closePlaylistPicker);
        if (elements.playlistNewBtn) elements.playlistNewBtn.addEventListener('click', () => {
            closePlaylistPicker();
            openPlaylistModal();
        });
        if (elements.playlistPicker) elements.playlistPicker.addEventListener('click', (e) => {
            if (e.target === elements.playlistPicker) closePlaylistPicker();
        });

        // Login prompt
    }

    // ========================================
    // Navigation & Views
    // ========================================
    function navigateTo(view, data = null) {
        // Save to history if not going back
        if (state.currentView !== view) {
            state.viewHistory.push({ view: state.currentView, data: state.viewData });
        }

        state.currentView = view;
        state.viewData = data;
        state.searchQuery = '';
        state.searchResults = null;
        elements.searchInput.value = '';
        elements.searchClear.style.display = 'none';

        // Update nav active state (desktop)
        elements.navItems.forEach(item => {
            const isActive = item.dataset.view === view ||
                           (view === 'album-detail' && item.dataset.view === 'albums') ||
                           (view === 'artist-detail' && item.dataset.view === 'artists') ||
                           (view === 'playlist-detail' && item.dataset.view === 'playlists');
            item.classList.toggle('active', isActive);
        });

        // Update nav active state (mobile)
        elements.mobileNavItems.forEach(item => {
            const isActive = item.dataset.view === view ||
                           (view === 'album-detail' && item.dataset.view === 'albums') ||
                           (view === 'artist-detail' && item.dataset.view === 'artists') ||
                           (view === 'playlist-detail' && item.dataset.view === 'playlists');
            item.classList.toggle('active', isActive);
        });

        renderView();
    }

    function navigateBack() {
        if (state.viewHistory.length > 0) {

    function renderView() {
        if (!state.library) return;

        let html = '';

        switch (state.currentView) {
            case 'songs':
                html = renderSongsView();
                break;
            case 'albums':
                html = renderAlbumsView();
                break;
            case 'artists':
                html = renderArtistsView();
                break;
            case 'playlists':
                html = renderPlaylistsView();
                break;
            case 'queue':
                html = renderQueueView();
                break;
            case 'radio':
                html = renderRadioView();
                break;
            case 'album-detail':
                html = renderAlbumDetailView(state.viewData);
                break;
            case 'artist-detail':
                html = renderArtistDetailView(state.viewData);
                break;
            case 'playlist-detail':
                html = renderPlaylistDetailView(state.viewData);
                break;
            case 'search':
                html = renderSearchView();
                break;
            default:
                html = renderSongsView();
        }

        elements.viewContainer.innerHTML = html;
        updateQueueCount();
    }

    // ========================================
    // Playback
    // ========================================
    function playTrack(track, addToQueue = true) {
        if (!track) return;

        // Exit radio mode if active
        if (state.isRadioMode) {
            stopRadio();
        }

        state.currentTrack = track;

        // Set audio source - encode path segments for special characters
        const encodedPath = track.path.split('/').map(segment => encodeURIComponent(segment)).join('/');
        elements.audio.src = encodedPath;
        elements.audio.play().catch(err => {
            console.error('Playback failed:', err);
        });

        // Update UI
        updateNowPlaying();
        updateDocumentTitle();

        // Add to queue if needed
        if (addToQueue) {
            // Clear queue and add this track
            state.queue = [track.id];
            state.queueIndex = 0;
        }

        // Re-render to update playing indicator
        if (state.currentView === 'songs' || state.currentView === 'queue' ||
            state.currentView === 'album-detail' || state.currentView === 'search') {
            renderView();
        }
    }

    function playTrackById(trackId, context = null) {
        const track = state.tracksById[trackId];
        if (!track) return;

        if (context) {
            // Playing in context (album, artist, all songs)
            state.queue = [...context];
            state.queueIndex = context.indexOf(trackId);
            if (state.shuffle) {
                shuffleQueue();
            }
        } else {
            // Just play this track
            state.queue = [trackId];
            state.queueIndex = 0;
        }

        playTrack(track, false);
    }

    function togglePlay() {
        if (!state.currentTrack) {
            // Start playing first song
            if (state.library.tracks.length > 0) {
                playAllSongs();
            }
            return;
        }

        if (state.isPlaying) {
            elements.audio.pause();
        } else {
            elements.audio.play();
        }
    }

    function playNext() {
        if (state.queue.length === 0) return;

        if (state.repeat === 'one') {
            // Repeat the same track
            elements.audio.currentTime = 0;
            elements.audio.play();
            return;
        }

        let nextIndex = state.queueIndex + 1;

        if (nextIndex >= state.queue.length) {
            if (state.repeat === 'all') {
                nextIndex = 0;
            } else {
                // End of queue
                return;
            }
        }

        state.queueIndex = nextIndex;
        const track = state.tracksById[state.queue[nextIndex]];
        if (track) {
            playTrack(track, false);
        }
    }

    function playPrevious() {
        // If more than 3 seconds in, restart current track
        if (elements.audio.currentTime > 3) {
            elements.audio.currentTime = 0;
            return;
        }

        if (state.queue.length === 0) return;

        let prevIndex = state.queueIndex - 1;

        if (prevIndex < 0) {
            if (state.repeat === 'all') {
                prevIndex = state.queue.length - 1;
            } else {
                elements.audio.currentTime = 0;
                return;
            }
        }

        state.queueIndex = prevIndex;
        const track = state.tracksById[state.queue[prevIndex]];
        if (track) {
            playTrack(track, false);
        }
    }

    function playAllSongs() {
        const trackIds = state.library.tracks.map(t => t.id);
        state.queue = [...trackIds];
        state.queueIndex = 0;

        if (state.shuffle) {
            shuffleQueue();
        }

        const track = state.tracksById[state.queue[0]];
        if (track) {
            playTrack(track, false);
        }
    }

    function playAlbum(albumId, shuffle = false) {
        const album = state.albumsById[albumId];
        if (!album) return;

        state.queue = [...album.tracks];
        state.queueIndex = 0;

        if (shuffle) {
            shuffleQueue();
        }

        const track = state.tracksById[state.queue[0]];
        if (track) {
            playTrack(track, false);
        }
    }

    async function playPlaylist(playlistId, shuffle = false) {
        const playlist = state.playlistsById[playlistId];
        if (!playlist) return;

        await ensurePlaylistLoaded(playlistId);

        if (!playlist.trackIds || playlist.trackIds.length === 0) return;

        state.queue = [...playlist.trackIds];
        state.queueIndex = 0;

        if (shuffle) {
            shuffleQueue();
        }

        const track = state.tracksById[state.queue[0]];
        if (track) {
            playTrack(track, false);
        }
    }

    function addToQueue(trackId, next = false) {
        if (next && state.queueIndex >= 0) {
            state.queue.splice(state.queueIndex + 1, 0, trackId);
        } else {
            state.queue.push(trackId);
        }
        updateQueueCount();
    }

    function playRadio(stationId) {
        const station = radioStations.find(s => s.id === stationId);
        if (!station) return;

        // Exit regular music mode
        state.currentTrack = null;
        state.isRadioMode = true;
        state.currentRadio = station;

        // Set audio source
        elements.audio.src = station.streamUrl;
        elements.audio.play().catch(err => {
            console.error('Radio playback failed:', err);
        });

        // Update UI
        updateNowPlayingRadio();
        updateDocumentTitle();

        // Add radio-mode class to now-playing-bar
        document.querySelector('.now-playing-bar').classList.add('radio-mode');

        // Re-render to update playing indicator
        if (state.currentView === 'radio') {
            renderView();
        }
    }

    function stopRadio() {
        if (!state.isRadioMode) return;

        state.isRadioMode = false;
        state.currentRadio = null;

        // Remove radio-mode class from now-playing-bar
        document.querySelector('.now-playing-bar').classList.remove('radio-mode');

        // Re-render if on radio view
        if (state.currentView === 'radio') {
            renderView();
        }
    }

    function updateNowPlayingRadio() {
        if (!state.currentRadio) return;

        elements.nowPlayingArt.src = state.currentRadio.logo;
        elements.nowPlayingArt.onerror = function() { this.src = 'music-art/default.svg'; };
        elements.nowPlayingTitle.innerHTML = `${escapeHtml(state.currentRadio.name)} <span class="now-playing-live-badge">LIVE</span>`;
        elements.nowPlayingArtist.textContent = `${state.currentRadio.frequency} - ${state.currentRadio.format}`;
    }

    function shuffleQueue() {
        if (state.queue.length <= 1) return;

        // Keep current track at the start
        const current = state.queue[state.queueIndex];
        const rest = state.queue.filter((_, i) => i !== state.queueIndex);

        // Fisher-Yates shuffle
        for (let i = rest.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [rest[i], rest[j]] = [rest[j], rest[i]];
        }

        state.queue = [current, ...rest];
        state.queueIndex = 0;
    }

    // ========================================
    // Controls
    // ========================================
    function toggleShuffle() {
        state.shuffle = !state.shuffle;
        updateShuffleUI();
        saveState();

        if (state.shuffle && state.queue.length > 1) {
            shuffleQueue();
        }
    }

    function toggleRepeat() {
        const modes = ['off', 'all', 'one'];
        const currentIndex = modes.indexOf(state.repeat);
        state.repeat = modes[(currentIndex + 1) % modes.length];
        updateRepeatUI();
        saveState();
    }

    function toggleMute() {
        state.muted = !state.muted;
        elements.audio.volume = state.muted ? 0 : state.volume;
        updateVolumeUI();
        saveState();
    }

    function setVolume(value) {
        state.volume = Math.max(0, Math.min(1, value));
        state.muted = false;
        elements.audio.volume = state.volume;
        updateVolumeUI();
        saveState();
    }

    // ========================================
    // UI Updates
    // ========================================
    function updateNowPlaying() {
        if (!state.currentTrack) {
            elements.nowPlayingArt.src = 'music-art/default.svg';
            elements.nowPlayingTitle.textContent = 'Not Playing';
            elements.nowPlayingArtist.textContent = 'Select a song to play';
            return;
        }

        elements.nowPlayingArt.src = state.currentTrack.art;
        elements.nowPlayingTitle.textContent = state.currentTrack.title;
        elements.nowPlayingArtist.textContent = state.currentTrack.artist;
    }

    function updateDocumentTitle() {
        if (state.isRadioMode && state.currentRadio && state.isPlaying) {
            document.title = `${state.currentRadio.name} - Live Radio`;
        } else if (state.currentTrack && state.isPlaying) {
            document.title = `${state.currentTrack.artist} �� ${state.currentTrack.title}`;
        } else {
            document.title = 'Music';
        }
    }

    function updatePlayButton() {
        const iconPlay = elements.btnPlay.querySelector('.icon-play');
        const iconPause = elements.btnPlay.querySelector('.icon-pause');

        if (state.isPlaying) {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        } else {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
        }

        updateDocumentTitle();

        // Update equalizer in song list
        const playingRow = elements.viewContainer.querySelector('.song-row.playing');
        if (playingRow) {
            const indicator = playingRow.querySelector('.playing-indicator');
            if (indicator) {
                indicator.innerHTML = state.isPlaying ? renderEqualizer() : renderPlayIcon();
            }
        }

        // Update radio view if currently showing
        if (state.currentView === 'radio') {
            renderView();
        }
    }

    function updateShuffleUI() {
        elements.btnShuffle.classList.toggle('active', state.shuffle);
    }

    function updateRepeatUI() {
        const iconOff = elements.btnRepeat.querySelector('.icon-repeat-off');
        const iconOne = elements.btnRepeat.querySelector('.icon-repeat-one');

        elements.btnRepeat.classList.toggle('active', state.repeat !== 'off');

        if (state.repeat === 'one') {
            iconOff.style.display = 'none';
            iconOne.style.display = 'block';
        } else {
            iconOff.style.display = 'block';
            iconOne.style.display = 'none';
        }
    }

    function updateVolumeUI() {
        const percent = state.muted ? 0 : state.volume * 100;
        elements.volumeFill.style.width = percent + '%';
        elements.volumeHandle.style.left = percent + '%';

        const iconHigh = elements.btnVolume.querySelector('.icon-volume-high');
        const iconMute = elements.btnVolume.querySelector('.icon-volume-mute');

        if (state.muted || state.volume === 0) {
            iconHigh.style.display = 'none';
            iconMute.style.display = 'block';
        } else {
            iconHigh.style.display = 'block';
            iconMute.style.display = 'none';
        }
    }

    function updateQueueCount() {
        const count = state.queue.length - state.queueIndex - 1;
        elements.queueCount.textContent = count > 0 ? count : '';
    }

    // ========================================
    // Event Handlers
    // ========================================
    function handleTimeUpdate() {
        const current = elements.audio.currentTime;
        const total = elements.audio.duration || 0;

        elements.timeCurrent.textContent = formatTime(current);

        if (total > 0) {
            const percent = (current / total) * 100;
            elements.progressFill.style.width = percent + '%';
            elements.progressHandle.style.left = percent + '%';
        }
    }

    function handleMetadataLoaded() {
        elements.timeTotal.textContent = formatTime(elements.audio.duration);
    }

    function handleTrackEnded() {
        playNext();
    }

    function handleAudioError(e) {
        console.error('Audio error:', e);
        console.error('Failed to load:', elements.audio.src);

        // Don't auto-skip - just stop and show error state
        state.isPlaying = false;
        updatePlayButton();

        // Update UI to show error
        if (state.currentTrack) {
            elements.nowPlayingTitle.textContent = 'Error loading track';
            elements.nowPlayingArtist.textContent = 'File may be unavailable';
        }
    }

    function handleProgressClick(e) {
        const rect = elements.progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        seekTo(percent);
    }

    function handleProgressDrag(percent) {
        seekTo(percent);
    }

    function seekTo(percent) {
        if (elements.audio.duration) {
            elements.audio.currentTime = percent * elements.audio.duration;
        }
    }

    function handleVolumeClick(e) {
        const rect = elements.volumeSlider.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        setVolume(percent);
    }

    function handleVolumeDrag(percent) {
        setVolume(percent);
    }

    function handleSearch(e) {
        const query = e.target.value.trim().toLowerCase();
        state.searchQuery = query;

        if (!query) {
            clearSearch();
            return;
        }

        elements.searchClear.style.display = 'block';

        // Search tracks
        state.searchResults = state.library.tracks.filter(track => {
            return track.title.toLowerCase().includes(query) ||
                   track.artist.toLowerCase().includes(query) ||
                   track.album.toLowerCase().includes(query);
        });

        state.currentView = 'search';
        renderView();
    }

    function clearSearch() {
        state.searchQuery = '';
        state.searchResults = null;
        elements.searchInput.value = '';
        elements.searchClear.style.display = 'none';

        if (state.currentView === 'search') {
            navigateTo('songs');
        }
    }

    function handleViewClick(e) {
        const target = e.target;

        // Handle back button
        if (target.closest('[data-action="back"]')) {
            navigateBack();
            return;
        }

        // Handle new playlist button
        if (target.closest('[data-action="new-playlist"]')) {
            openPlaylistModal();
            return;
        }

        // Handle playlist card click
        const playlistCard = target.closest('.playlist-card');
        if (playlistCard) {
            const playlistId = playlistCard.dataset.playlistId;
            navigateTo('playlist-detail', playlistId);
            return;
        }

        // Handle playlist actions
        const playPlaylistBtn = target.closest('[data-action="play-playlist"]');
        if (playPlaylistBtn) {
            e.stopPropagation();
            playPlaylist(playPlaylistBtn.dataset.playlistId, false);
            return;
        }

        const shufflePlaylistBtn = target.closest('[data-action="shuffle-playlist"]');
        if (shufflePlaylistBtn) {
            e.stopPropagation();
            playPlaylist(shufflePlaylistBtn.dataset.playlistId, true);
            return;
        }

        const renamePlaylistBtn = target.closest('[data-action="rename-playlist"]');
        if (renamePlaylistBtn) {
            e.stopPropagation();
            const playlistId = renamePlaylistBtn.dataset.playlistId;
            const playlist = state.playlistsById[playlistId];
            if (playlist) {
                const newName = prompt('Rename playlist:', playlist.name);
                if (newName && newName.trim()) {
                    renamePlaylist(playlistId, newName.trim());
                }
            }
            return;
        }

        const deletePlaylistBtn = target.closest('[data-action="delete-playlist"]');
        if (deletePlaylistBtn) {
            e.stopPropagation();
            const playlistId = deletePlaylistBtn.dataset.playlistId;
            if (confirm('Delete this playlist?')) {
                deletePlaylist(playlistId);
            }
            return;
        }

        // Handle radio card click
        const radioCard = target.closest('.radio-card');
        if (radioCard) {
            const stationId = radioCard.dataset.stationId;
            // If clicking on same station that's playing, toggle play/pause
            if (state.isRadioMode && state.currentRadio && state.currentRadio.id === stationId) {
                if (state.isPlaying) {
                    elements.audio.pause();
                } else {
                    elements.audio.play();
                }
            } else {
                playRadio(stationId);
            }
            return;
        }

        // Handle album play button
        const playAlbumBtn = target.closest('[data-action="play-album"]');
        if (playAlbumBtn) {
            e.stopPropagation();
            const albumId = playAlbumBtn.dataset.albumId;
            playAlbum(albumId);
            return;
        }

        // Handle album shuffle button
        const shuffleAlbumBtn = target.closest('[data-action="shuffle-album"]');
        if (shuffleAlbumBtn) {
            const albumId = shuffleAlbumBtn.dataset.albumId;
            playAlbum(albumId, true);
            return;
        }

        // Handle album card click
        const albumCard = target.closest('.album-card');
        if (albumCard && !target.closest('.album-play-btn')) {
            const albumId = albumCard.dataset.albumId;
            navigateTo('album-detail', albumId);
            return;
        }

        // Handle artist card click
        const artistCard = target.closest('.artist-card');
        if (artistCard) {
            const artistId = artistCard.dataset.artistId;
            navigateTo('artist-detail', artistId);
            return;
        }

        // Handle song row click
        const songRow = target.closest('.song-row');
        if (songRow) {
            const trackId = songRow.dataset.trackId;

            // Determine context
            let context = null;
            if (state.currentView === 'songs' || state.currentView === 'search') {
                const tracks = state.searchResults || state.library.tracks;
                context = tracks.map(t => t.id);
            } else if (state.currentView === 'album-detail') {
                const album = state.albumsById[state.viewData];
                if (album) {
                    context = album.tracks;
                }
            } else if (state.currentView === 'queue') {
                context = state.queue;
            }

            playTrackById(trackId, context);
            return;
        }

        // Handle artist name click in song list
        const artistName = target.closest('.song-artist, .album-detail-artist');
        if (artistName) {
            e.stopPropagation();
            const artistNameText = artistName.dataset.artist;
            const artist = state.library.artists.find(a => a.name === artistNameText);
            if (artist) {
                navigateTo('artist-detail', artist.id);
            }
            return;
        }

        // Handle album name click in song list
        const albumName = target.closest('.song-album');
        if (albumName) {
            e.stopPropagation();
            const albumNameText = albumName.dataset.album;
            // Find album by name (may not be unique, so find first match)
            const album = state.library.albums.find(a => a.name === albumNameText);
            if (album) {
                navigateTo('album-detail', album.id);
            }
            return;
        }
    }

    function handleContextMenu(e) {
        const songRow = e.target.closest('.song-row');
        if (!songRow) return;

        e.preventDefault();

        const trackId = songRow.dataset.trackId;
        elements.contextMenu.dataset.trackId = trackId;

        // Position context menu
        const x = Math.min(e.clientX, window.innerWidth - 200);
        const y = Math.min(e.clientY, window.innerHeight - 150);

        elements.contextMenu.style.left = x + 'px';
        elements.contextMenu.style.top = y + 'px';
        elements.contextMenu.classList.add('visible');
    }

    function hideContextMenu() {
        elements.contextMenu.classList.remove('visible');
    }

    function handleContextMenuClick(e) {
        const item = e.target.closest('.context-item');
        if (!item) return;

        const action = item.dataset.action;
        const trackId = elements.contextMenu.dataset.trackId;
        const track = state.tracksById[trackId];

        if (!track) return;

        switch (action) {
            case 'play-next':
                addToQueue(trackId, true);
                break;
            case 'add-to-queue':
                addToQueue(trackId, false);
                break;
            case 'add-to-playlist':
                openPlaylistPicker(trackId);
                break;
            case 'go-to-artist':
                const artist = state.library.artists.find(a => a.name === track.artist);
                if (artist) {
                    navigateTo('artist-detail', artist.id);
                }
                break;
            case 'go-to-album':
                const album = state.library.albums.find(a => a.name === track.album && a.artist === track.artist);
                if (album) {
                    navigateTo('album-detail', album.id);
                }
                break;
        }

        hideContextMenu();
    }

    function handleKeydown(e) {
        // Don't handle if typing in input
        if (e.target.tagName === 'INPUT') return;

        switch (e.key) {
            case ' ':
                e.preventDefault();
                togglePlay();
                break;
            case 'ArrowRight':
                if (e.metaKey || e.ctrlKey) {
                    playNext();
                } else {
                    // Seek forward 10s
                    elements.audio.currentTime += 10;
                }
                break;
            case 'ArrowLeft':
                if (e.metaKey || e.ctrlKey) {
                    playPrevious();
                } else {
                    // Seek backward 10s
                    elements.audio.currentTime -= 10;
                }
                break;
            case 'ArrowUp':
                e.preventDefault();
                setVolume(state.volume + 0.1);
                break;
            case 'ArrowDown':
                e.preventDefault();
                setVolume(state.volume - 0.1);
                break;
            case 'm':
            case 'M':
                toggleMute();
                break;
            case 's':
            case 'S':
                toggleShuffle();
                break;
            case 'r':
            case 'R':
                toggleRepeat();
                break;
            case '/':
                e.preventDefault();
                elements.searchInput.focus();
                break;
            case 'Escape':
                if (state.currentView === 'search') {
                    clearSearch();
                }
                break;
        }
    }

    // ========================================
    // Utilities
    // ========================================
    function formatTime(seconds) {
        if (!seconds || !isFinite(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function formatDurationLong(seconds) {
        const hours = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);

        if (hours > 0) {
            return `${hours} hr ${mins} min`;
        }
        return `${mins} min`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function debounce(fn, delay) {
        let timer;
        return function(...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    function setupDrag(element, onDrag) {
        let isDragging = false;

        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();

            const rect = element.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            onDrag(percent);
        }

        function handleEnd() {
            isDragging = false;
            document.removeEventListener('mousemove', handleMove);
            document.removeEventListener('mouseup', handleEnd);
            document.removeEventListener('touchmove', handleMove);
            document.removeEventListener('touchend', handleEnd);
        }

        element.addEventListener('mousedown', (e) => {
            isDragging = true;
            handleMove(e);
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('mouseup', handleEnd);
        });

        element.addEventListener('touchstart', (e) => {
            isDragging = true;
            handleMove(e);
            document.addEventListener('touchmove', handleMove, { passive: false });
            document.addEventListener('touchend', handleEnd);
        });
    }

    // ========================================
    // Start
    // ========================================
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>
</body>
</html>
