
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GN-Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

:root {
  --ink:      #080808;
  --deep:     #0e0e0e;
  --surface:  #141414;
  --raised:   #1c1c1c;
  --high:     #242424;
  --edge:     rgba(255,255,255,.07);
  --red:      #e8181f;
  --red-2:    #c01218;
  --red-glow: rgba(232,24,31,.3);
  --red-soft: rgba(232,24,31,.12);
  --white:    #f2f2f2;
  --dim:      #888;
  --faint:    #444;

  --font-head: 'Anton', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --gap: 7px;
  --r: 7px;
  --bar: 88px;
  --side: 275px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  outline: none;
  user-select: none;
  -webkit-user-select: none;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
}

body {
  background: var(--ink);
  color: var(--white);
  font-family: var(--font-body);
  display: grid;
  grid-template-rows: 1fr var(--bar);
  font-size: 14px;
  line-height: 1;
}

/* ─────────── SCROLLBARS ─────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--high); border-radius: 3px; }

/* ─────────── SPLASH ─────────── */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .6s ease .1s;
}
#splash.out { opacity: 0; pointer-events: none; }

.splash-logo {
  display: flex; align-items: baseline; gap: 2px;
  overflow: hidden;
}

.logo-gn {
  font-family: var(--font-head);
  font-size: 88px;
  color: var(--red);
  letter-spacing: -2px;
  animation: logoSlam .5s cubic-bezier(.2,.8,.3,1.3) both;
  text-shadow: 0 0 40px var(--red-glow);
}

.logo-music {
  font-family: var(--font-head);
  font-size: 88px;
  color: var(--white);
  letter-spacing: -2px;
  max-width: 0;
  overflow: hidden;
  white-space: nowrap;
  animation: logoReveal .7s .45s cubic-bezier(.16,1,.3,1) forwards;
}

@keyframes logoSlam {
  from { transform: scale(0.4) rotate(-8deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}
@keyframes logoReveal {
  from { max-width: 0; opacity: 0; }
  to   { max-width: 600px; opacity: 1; }
}

/* ─────────── TOAST ─────────── */
#toast {
  position: fixed;
  bottom: calc(var(--bar) + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--red);
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: .4px;
  padding: 9px 22px;
  border-radius: 3px;
  opacity: 0;
  pointer-events: none;
  transition: .25s cubic-bezier(.34,1.56,.64,1);
  z-index: 5000;
  box-shadow: 0 8px 24px var(--red-glow);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─────────── MODAL ─────────── */
#modal-bg {
  position: fixed; inset: 0; z-index: 6000;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-box {
  background: #1a1a1a;
  border: 1px solid var(--edge);
  border-radius: 10px;
  width: 380px;
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 32px 60px rgba(0,0,0,.8);
}
.modal-h { font-family: var(--font-head); font-size: 30px; letter-spacing: .5px; }
.modal-inp {
  background: var(--raised);
  border: 1px solid var(--edge);
  color: var(--white);
  border-radius: 5px;
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  transition: border-color .2s;
  width: 100%;
}
.modal-inp:focus { border-color: var(--red); }
.modal-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }
.m-cancel {
  background: none; border: none; color: var(--dim); cursor: pointer;
  font-family: var(--font-body); font-weight: 700; font-size: 14px;
  padding: 10px 18px; border-radius: 20px; transition: color .2s;
}
.m-cancel:hover { color: var(--white); }
.m-ok {
  background: var(--red); color: #fff; border: none;
  font-family: var(--font-body); font-weight: 700; font-size: 14px;
  cursor: pointer; padding: 10px 26px; border-radius: 20px;
  transition: background .2s, transform .15s;
}
.m-ok:hover { background: #ff2228; transform: scale(1.03); }

/* ─────────── CONTEXT MENU ─────────── */
#ctx {
  position: fixed; z-index: 4000;
  background: #202020;
  border: 1px solid var(--edge);
  border-radius: 6px;
  padding: 5px;
  width: 215px;
  box-shadow: 0 16px 40px rgba(0,0,0,.7);
  display: none;
}
.ctx-row {
  padding: 10px 12px;
  font-size: 13px;
  color: #ddd;
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}
.ctx-row:hover { background: var(--raised); }
.ctx-sub {
  position: absolute;
  left: calc(100% + 4px); top: -4px;
  background: #202020;
  border: 1px solid var(--edge);
  border-radius: 6px;
  padding: 5px;
  width: 200px;
  display: none;
  box-shadow: 0 16px 40px rgba(0,0,0,.7);
}
.ctx-row:hover .ctx-sub { display: block; }

/* ─────────── SHELL ─────────── */
.shell {
  display: flex;
  height: 100%;
  padding: var(--gap) var(--gap) 0;
  gap: var(--gap);
  overflow: hidden;
}

/* ─────────── SIDEBAR ─────────── */
.sidebar {
  width: var(--side);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

.nav-block {
  background: var(--surface);
  border-radius: var(--r);
  padding: 10px 8px;
}

.nav-row {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 11px 14px;
  border-radius: 4px;
  color: var(--dim);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: color .15s, background .15s;
}
.nav-row:hover { color: var(--white); background: var(--raised); }
.nav-row.on  { color: var(--white); }
.nav-row.on i { color: var(--red); }
.nav-row i   { width: 18px; text-align: center; font-size: 15px; }

.lib-wrap {
  flex: 1;
  background: var(--surface);
  border-radius: var(--r);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.lib-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--edge);
  flex-shrink: 0;
}

.lib-label {
  font-family: var(--font-head);
  font-size: 20px;
  letter-spacing: .5px;
  color: var(--dim);
  cursor: pointer;
  transition: color .2s;
}
.lib-label:hover { color: var(--white); }

.lib-plus {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); cursor: pointer;
  border-radius: 50%;
  transition: color .2s, background .2s;
  font-size: 14px;
}
.lib-plus:hover { color: var(--white); background: var(--raised); }

.lib-scroll { flex: 1; overflow-y: auto; padding: 8px; }

.pl-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.pl-item:hover { background: var(--raised); }

.pl-thumb {
  width: 46px; height: 46px;
  border-radius: 4px;
  flex-shrink: 0;
  background: var(--high);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--faint);
}
.pl-thumb.liked-thumb {
  background: linear-gradient(135deg, #5a0000 0%, #180000 100%);
  color: var(--red);
}
.pl-text { flex: 1; min-width: 0; }
.pl-name {
  font-size: 14px; font-weight: 600; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.pl-meta { font-size: 12px; color: var(--dim); }
.pl-del {
  display: none; color: var(--dim);
  cursor: pointer; padding: 4px; font-size: 12px;
  transition: color .15s; flex-shrink: 0;
}
.pl-item:hover .pl-del { display: block; }
.pl-del:hover { color: var(--red); }

/* ─────────── MAIN VIEW ─────────── */
.main {
  flex: 1;
  background: var(--surface);
  border-radius: var(--r);
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}

.topbar {
  position: sticky; top: 0; z-index: 200;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: transparent;
  transition: background .3s;
}
.topbar.fixed { background: rgba(10,10,10,.94); backdrop-filter: blur(12px); }

.back-btns { display: flex; gap: 6px; align-items: center; }
.arrow {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,.5);
  border: none; color: var(--dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer;
  transition: color .15s, background .15s;
}
.arrow:hover { color: var(--white); background: var(--raised); }

#search-inp {
  display: none;
  margin-left: 10px;
  background: var(--raised);
  border: 1.5px solid var(--edge);
  border-radius: 22px;
  color: var(--white);
  padding: 7px 18px;
  font-family: var(--font-body);
  font-size: 14px;
  width: 280px;
  transition: border-color .2s;
}
#search-inp:focus { border-color: var(--red); }

.user-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,.5);
  padding: 5px 14px 5px 8px;
  border-radius: 20px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background .2s;
}
.user-chip:hover { background: var(--raised); }
.user-chip i { font-size: 22px; color: var(--red); }

/* ─────────── HERO BANNER ─────────── */
.hero {
  position: relative;
  display: flex;
  align-items: flex-end;
  gap: 26px;
  padding: 72px 28px 26px;
  min-height: 300px;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center 25%;
  filter: blur(5px) brightness(.35) saturate(1.2);
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(8,8,8,0) 20%, var(--surface) 100%);
}
.hero-art {
  position: relative; z-index: 2;
  width: 190px; height: 190px;
  border-radius: 4px;
  background: var(--raised);
  background-size: cover; background-position: center;
  flex-shrink: 0;
  box-shadow: 0 16px 48px rgba(0,0,0,.8);
}
.hero-art.round { border-radius: 50%; }
.hero-info {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; gap: 7px;
}
.hero-type {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--dim);
}
.hero-title {
  font-family: var(--font-head);
  font-size: 68px;
  letter-spacing: -1px;
  line-height: .95;
  color: var(--white);
}
.hero-sub { font-size: 14px; color: #aaa; }
.badge {
  display: inline-flex; align-items: center;
  position: relative; width: 19px; height: 19px;
  margin-left: 5px; vertical-align: middle;
}
.badge .circle  { color: #3a8ef4; font-size: 19px; }
.badge .check   { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 8px; }

/* ─────────── CONTENT AREA ─────────── */
.pad {
  padding: 22px 28px 120px;
}

.section-head {
  font-family: var(--font-head);
  font-size: 24px;
  letter-spacing: .4px;
  color: var(--white);
  margin: 34px 0 16px;
  cursor: pointer;
  display: inline-block;
  transition: color .2s;
}
.section-head:hover { color: var(--red); }

/* ─────────── CARD GRID ─────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
  gap: 16px;
}

.card {
  background: var(--raised);
  padding: 14px;
  border-radius: var(--r);
  cursor: pointer;
  border: 1px solid transparent;
  transition: background .2s, border-color .2s, transform .2s;
}
.card:hover {
  background: var(--high);
  border-color: var(--edge);
  transform: translateY(-2px);
}

.card-img {
  width: 100%; aspect-ratio: 1;
  border-radius: 4px;
  background: var(--high);
  background-size: cover; background-position: center;
  position: relative;
  margin-bottom: 13px;
  box-shadow: 0 6px 18px rgba(0,0,0,.55);
  flex-shrink: 0;
}
.card-img.circle { border-radius: 50%; }

.card-play {
  position: absolute; bottom: 8px; right: 8px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: #fff;
  opacity: 0; transform: translateY(8px);
  transition: opacity .22s, transform .22s;
  box-shadow: 0 6px 16px var(--red-glow);
}
.card:hover .card-play { opacity: 1; transform: translateY(0); }

.card-title {
  font-size: 14px; font-weight: 700; color: var(--white);
  margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-sub {
  font-size: 12px; color: var(--dim);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.5;
}

/* quick tiles */
.quick-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.quick-tile {
  height: 52px;
  background: var(--raised);
  border: 1px solid var(--edge);
  border-radius: 5px;
  display: flex; align-items: center; overflow: hidden;
  cursor: pointer; transition: background .2s;
}
.quick-tile:hover { background: var(--high); }
.tile-icon {
  width: 52px; height: 52px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.tile-label { font-size: 13px; font-weight: 700; padding: 0 14px; }

/* big play */
.big-play {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: var(--red);
  border: none; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  cursor: pointer;
  margin-bottom: 26px;
  transition: background .2s, transform .15s;
  box-shadow: 0 6px 22px var(--red-glow);
}
.big-play:hover { background: #ff2228; transform: scale(1.06); }

/* ─────────── SONG TABLE ─────────── */
.song-tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  color: var(--dim);
}
.song-tbl thead tr { border-bottom: 1px solid var(--edge); }
.song-tbl th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--faint);
}
.song-tbl tbody tr {
  height: 54px;
  transition: background .12s;
}
.song-tbl tbody tr:hover { background: rgba(255,255,255,.04); }
.song-tbl tbody tr.playing .s-title { color: var(--red); }
.song-tbl td { padding: 0 12px; }

.num-col { width: 46px; text-align: center; }
.row-num  { color: var(--dim); font-size: 13px; }
.row-play { display: none; color: var(--white); cursor: pointer; font-size: 13px; }
.song-tbl tr:hover .row-num  { display: none; }
.song-tbl tr:hover .row-play { display: inline; }

.s-wrap { display: flex; align-items: center; gap: 13px; }
.s-img { width: 38px; height: 38px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
.s-title { color: var(--white); font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.s-artist { font-size: 12px; color: var(--dim); }

.heart-col {
  display: flex; align-items: center; gap: 14px;
}
.hrt {
  cursor: pointer; font-size: 14px; color: var(--dim);
  transition: color .2s, transform .2s;
}
.hrt.on  { color: var(--red); }
.hrt:hover { transform: scale(1.2); }
.hrt-pop { animation: hrtPop .28s ease; }
@keyframes hrtPop { 50% { transform: scale(1.4); } }

/* loader ring */
.ring {
  width: 28px; height: 28px;
  border: 3px solid rgba(255,255,255,.08);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 40px auto;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─────────── PLAYER BAR ─────────── */
.player {
  background: #121212;
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: relative;
}

/* thin red line on top */
.player::before {
  content: '';
  position: absolute;
  top: -1px; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
}

.p-left {
  width: 30%;
  display: flex; align-items: center; gap: 12px;
}
.p-thumb {
  width: 52px; height: 52px;
  border-radius: 4px;
  background: var(--raised);
  background-size: cover; background-position: center;
  flex-shrink: 0;
  border: 1px solid var(--edge);
}
.p-meta { min-width: 0; }
.p-title {
  font-size: 13px; font-weight: 600; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.p-artist {
  font-size: 11px; color: var(--dim);
  cursor: pointer; margin-top: 3px;
}
.p-heart {
  font-size: 16px; color: var(--dim);
  cursor: pointer; flex-shrink: 0;
  margin-left: 5px;
  transition: color .2s, transform .2s;
}
.p-heart.on { color: var(--red); }
.p-heart:hover { transform: scale(1.18); }

.p-center {
  width: 40%;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
.p-ctrl {
  display: flex; align-items: center; gap: 22px;
}
.ctrl-btn {
  background: none; border: none;
  color: var(--dim); font-size: 15px;
  cursor: pointer;
  transition: color .15s, transform .12s;
}
.ctrl-btn:hover { color: var(--white); transform: scale(1.1); }
.ctrl-btn.on { color: var(--red); }

.play-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--white);
  border: none; color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer;
  transition: transform .15s, background .2s;
}
.play-circle:hover { transform: scale(1.08); background: #e8e8e8; }

.prog-row {
  width: 100%;
  display: flex; align-items: center; gap: 9px;
  font-size: 11px; color: var(--dim);
}

/* range inputs */
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%; height: 4px;
  border-radius: 2px;
  background: var(--raised);
  cursor: pointer;
  background-image: linear-gradient(var(--red), var(--red));
  background-size: 0% 100%;
  background-repeat: no-repeat;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--white);
  opacity: 0;
  transition: opacity .18s;
}
.prog-row:hover input[type=range]::-webkit-slider-thumb { opacity: 1; }

/* drive iframe container */
#drive-box {
  display: none;
  width: 100%; height: 72px;
  align-items: center; justify-content: center;
}
#drive-frame { width: 100%; height: 100%; border: none; }

.p-right {
  width: 30%;
  display: flex; align-items: center;
  justify-content: flex-end; gap: 10px;
}
.vol-icon {
  color: var(--dim); font-size: 14px;
  cursor: pointer; transition: color .15s;
}
.vol-icon:hover { color: var(--white); }
.vol-row { width: 120px; display: flex; align-items: center; }

</style>
</head>
<body>

<!-- splash -->
<div id="splash">
  <div class="splash-logo">
    <span class="logo-gn">GN</span>
    <span class="logo-music">-MUSIC</span>
  </div>
</div>

<div id="toast"></div>

<!-- create playlist modal -->
<div id="modal-bg">
  <div class="modal-box">
    <div class="modal-h">New Playlist</div>
    <input type="text" class="modal-inp" id="pl-name" placeholder="My Playlist #1">
    <div class="modal-row">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-ok"     onclick="doCreate()">Create</button>
    </div>
  </div>
</div>

<!-- context menu -->
<div id="ctx">
  <div class="ctx-row" onclick="ctxLike()">Add to Liked Songs</div>
  <div class="ctx-row">
    Add to Playlist <i class="fas fa-chevron-right" style="font-size:10px; color:var(--dim)"></i>
    <div class="ctx-sub" id="ctx-subs"></div>
  </div>
</div>

<!-- shell -->
<div class="shell">

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="nav-block">
      <div class="nav-row on" id="n-home" onclick="nav('home')">
        <i class="fas fa-house"></i> Home
      </div>
      <div class="nav-row" id="n-search" onclick="nav('search')">
        <i class="fas fa-magnifying-glass"></i> Search
      </div>
    </div>

    <div class="lib-wrap">
      <div class="lib-top">
        <span class="lib-label" onclick="nav('library')">Your Library</span>
        <div class="lib-plus" onclick="openModal()" title="Create playlist">
          <i class="fas fa-plus"></i>
        </div>
      </div>
      <div class="lib-scroll" id="pl-list"></div>
    </div>
  </aside>

  <!-- main -->
  <main class="main" id="main">
    <div class="topbar" id="topbar">
      <div style="display:flex; align-items:center;">
        <div class="back-btns">
          <button class="arrow" onclick="history.back()"><i class="fas fa-chevron-left"></i></button>
          <button class="arrow" onclick="history.forward()"><i class="fas fa-chevron-right"></i></button>
        </div>
        <input type="text" id="search-inp" placeholder="Artists, songs, or albums…"
               onkeydown="if(event.key==='Enter') doSearch(this.value)">
      </div>
      <div class="user-chip">
        <i class="fas fa-circle-user"></i> User
      </div>
    </div>

    <div id="view"></div>
  </main>

</div>

<!-- player bar -->
<div class="player">
  <div class="p-left">
    <div class="p-thumb" id="p-thumb"></div>
    <div class="p-meta">
      <div class="p-title"  id="p-title">One Dance</div>
      <div class="p-artist" id="p-artist">Drake</div>
    </div>
    <i class="far fa-heart p-heart" id="p-heart" onclick="heartCurrent()"></i>
  </div>

  <div class="p-center">
    <div id="std-ctrl" style="display:none; flex-direction:column; align-items:center; gap:8px; width:100%;">
      <div class="p-ctrl">
        <button class="ctrl-btn" id="btn-shuf" onclick="toggleShuffle()"><i class="fas fa-shuffle"></i></button>
        <button class="ctrl-btn" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
        <div class="play-circle" onclick="togglePlay()"><i id="play-ico" class="fas fa-play"></i></div>
        <button class="ctrl-btn" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
        <button class="ctrl-btn" id="btn-loop" onclick="toggleLoop()"><i class="fas fa-repeat"></i></button>
      </div>
      <div class="prog-row">
        <span id="t-now">0:00</span>
        <input type="range" id="seekbar" min="0" max="100" value="0">
        <span id="t-end">0:00</span>
      </div>
    </div>
    <div id="drive-box">
      <iframe id="drive-frame" src="" allow="autoplay"></iframe>
    </div>
  </div>

  <div class="p-right">
    <i class="fas fa-volume-high vol-icon" id="vol-ico" onclick="muteToggle()"></i>
    <div class="vol-row">
      <input type="range" id="volbar" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
</div>

<script>

// ── local seed tracks ──────────────────────────────────────────────────────
const SEED = [
  {
    id: 'local_one_dance',
    title: 'One Dance',
    artist: 'Drake',
    album: 'Views',
    cover: 'https://i1.sndcdn.com/artworks-Wa4BkYH67j8ang1m-1WgOmw-t500x500.jpg',
    url: 'https://drive.google.com/file/d/1MPasajSHd_yV5ev1_x7oulImHxRa8wsC/preview',
    duration: '2:54',
    isDrive: true
  }
];

// ── state ──────────────────────────────────────────────────────────────────
const S = {
  db:       [...SEED],
  queue:    [],
  qIdx:     0,
  playing:  false,
  shuffle:  false,
  loop:     false,
  playlists: JSON.parse(localStorage.getItem('gnm_pl')   || '[]'),
  liked:     JSON.parse(localStorage.getItem('gnm_lk')   || '[]'),
  cache:     JSON.parse(localStorage.getItem('gnm_cache') || '{}'),
  ctxId:    null
};

const aud = new Audio();
aud.crossOrigin = 'anonymous';

// ── Deezer search (no key needed) ──
async function deezerSearch(q, limit = 25) {
  try {
    const r = await fetch(
      `https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=${limit}`
    );

    const d = await r.json();

    return d.data.map(track => ({
      title: track.title,
      artist: track.artist.name,
      artwork: track.album.cover_medium,
      url: track.link,
      duration: track.duration
    }));
  } catch (e) {
    return [];
  }
}

function normTrack(t) {
  return {
    id:       String(t.trackId),
    title:    t.trackName || '',
    artist:   t.artistName || '',
    album:    t.collectionName || '',
    cover:    (t.artworkUrl100 || '').replace('100x100bb', '600x600bb'),
    url:      t.previewUrl || '',
    duration: fmtMs(t.trackTimeMillis),
    isDrive:  false
  };
}

function fmtMs(ms) {
  if (!ms) return '0:30';
  const m = Math.floor(ms / 60000);
  const s = Math.round((ms % 60000) / 1000);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function fmtSec(t) {
  if (isNaN(t) || !isFinite(t)) return '0:00';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

// ── persistence ─────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('gnm_pl',    JSON.stringify(S.playlists));
  localStorage.setItem('gnm_lk',    JSON.stringify(S.liked));
  localStorage.setItem('gnm_cache', JSON.stringify(S.cache));
}

// ── toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── modal ─────────────────────────────────────────────────────────────────────
function openModal() { document.getElementById('modal-bg').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }
function doCreate() {
  const n = document.getElementById('pl-name').value.trim();
  if (!n) return;
  S.playlists.push({ id: 'pl_' + Date.now(), name: n, songs: [] });
  save(); renderSidebar(); closeModal();
  document.getElementById('pl-name').value = '';
}

// ── range fill helper ─────────────────────────────────────────────────────────
function fillRange(el) {
  const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
  el.style.backgroundSize = pct + '% 100%';
}

// ── sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('pl-list').innerHTML =
    `<div class="pl-item" onclick="nav('liked')">
       <div class="pl-thumb liked-thumb"><i class="fas fa-heart"></i></div>
       <div class="pl-text">
         <div class="pl-name">Liked Songs</div>
         <div class="pl-meta">Auto Playlist</div>
       </div>
     </div>` +
    S.playlists.map(pl =>
      `<div class="pl-item" onclick="nav('playlist','${pl.id}')">
         <div class="pl-thumb"><i class="fas fa-music"></i></div>
         <div class="pl-text">
           <div class="pl-name">${pl.name}</div>
           <div class="pl-meta">Playlist</div>
         </div>
         <i class="fas fa-times pl-del" onclick="deletePl('${pl.id}',event)"></i>
       </div>`
    ).join('');
}

function deletePl(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this playlist?')) return;
  S.playlists = S.playlists.filter(p => p.id !== id);
  save(); renderSidebar(); nav('home');
}

// ── context menu ──────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  if (!e.target.closest('#ctx')) document.getElementById('ctx').style.display = 'none';
});

function openCtx(e, id, track) {
  e.preventDefault();
  S.ctxId = id;
  if (track) S.cache[id] = track;

  const subs = document.getElementById('ctx-subs');
  subs.innerHTML = S.playlists.length
    ? S.playlists.map(p => `<div class="ctx-row" onclick="addToPl('${p.id}')">${p.name}</div>`).join('')
    : `<div class="ctx-row" style="color:var(--dim);cursor:default">No playlists</div>`;

  const m = document.getElementById('ctx');
  m.style.display = 'block';
  m.style.left = e.pageX + 'px';
  m.style.top  = e.pageY + 'px';
}

function ctxLike() {
  if (S.ctxId) toggleLike(S.ctxId, S.cache[S.ctxId]);
  document.getElementById('ctx').style.display = 'none';
}

function addToPl(pid) {
  const pl = S.playlists.find(p => p.id === pid);
  if (pl && S.ctxId) {
    if (pl.songs.includes(S.ctxId)) { toast('Already in playlist'); }
    else { pl.songs.push(S.ctxId); save(); toast('Added to ' + pl.name); }
  }
  document.getElementById('ctx').style.display = 'none';
}

// ── like ───────────────────────────────────────────────────────────────────────
function toggleLike(id, track) {
  if (S.liked.includes(id)) {
    S.liked = S.liked.filter(x => x !== id);
  } else {
    S.liked.push(id);
    if (track) S.cache[id] = track;
  }
  save();

  // update player heart
  const cur = S.queue[S.qIdx];
  if (cur && cur.id === id) refreshHeart();

  // update table hearts
  document.querySelectorAll(`.hrt[data-id="${id}"]`).forEach(el => {
    const on = S.liked.includes(id);
    el.className = (on ? 'fas' : 'far') + ' fa-heart hrt' + (on ? ' on' : '');
    el.dataset.id = id;
    el.classList.add('hrt-pop');
    setTimeout(() => el.classList.remove('hrt-pop'), 300);
  });
}

function heartCurrent() {
  const s = S.queue[S.qIdx];
  if (s) toggleLike(s.id, s);
}

function refreshHeart() {
  const s = S.queue[S.qIdx];
  if (!s) return;
  const h = document.getElementById('p-heart');
  const on = S.liked.includes(s.id);
  h.className = (on ? 'fas' : 'far') + ' fa-heart p-heart' + (on ? ' on' : '');
}

// ── nav & views ────────────────────────────────────────────────────────────────
document.getElementById('main').addEventListener('scroll', function () {
  document.getElementById('topbar').classList.toggle('fixed', this.scrollTop > 50);
});

async function nav(view, param) {
  document.querySelectorAll('.nav-row').forEach(r => r.classList.remove('on'));
  const sf = document.getElementById('search-inp');
  sf.style.display = 'none';

  if (view === 'home')   document.getElementById('n-home').classList.add('on');
  if (view === 'search') {
    document.getElementById('n-search').classList.add('on');
    sf.style.display = 'block'; sf.focus();
  }

  const v = document.getElementById('view');
  v.innerHTML = '<div class="ring" style="display:block"></div>';

  if      (view === 'home')     await renderHome(v);
  else if (view === 'search')   renderSearch(v);
  else if (view === 'liked')    renderPlaylist(v, { name: 'Liked Songs', isLiked: true }, S.liked.map(id => S.cache[id]).filter(Boolean));
  else if (view === 'playlist') {
    const pl = S.playlists.find(p => p.id === param);
    if (pl) renderPlaylist(v, { name: pl.name, isLiked: false }, pl.songs.map(id => S.cache[id]).filter(Boolean));
  }
  else if (view === 'artist')   await renderArtist(v, param);
}

async function renderHome(v) {
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const artists = uniqueArtists(S.db).slice(0, 8);
  const picks   = S.db.slice(0, 12);

  v.innerHTML = `
    <div class="pad">
      <h1 style="font-family:var(--font-head);font-size:38px;letter-spacing:.5px;margin-bottom:26px;">${greet}</h1>
      <div class="quick-row">
        <div class="quick-tile" onclick="nav('liked')">
          <div class="tile-icon" style="background:linear-gradient(135deg,#5a0000,#180000);color:var(--red);">
            <i class="fas fa-heart"></i>
          </div>
          <span class="tile-label">Liked Songs</span>
        </div>
        <div class="quick-tile" onclick="nav('search')">
          <div class="tile-icon" style="background:var(--high);color:var(--dim);">
            <i class="fas fa-magnifying-glass"></i>
          </div>
          <span class="tile-label">Search</span>
        </div>
      </div>
      <div class="section-head">Trending Artists</div>
      <div class="grid">
        ${artists.map(a => cardHtml({ title: a.name, artist: 'Artist', cover: a.cover, _artistNav: a.name })).join('')}
      </div>
      <div class="section-head">Charts &amp; Picks</div>
      <div class="grid">${picks.map(s => cardHtml(s)).join('')}</div>
    </div>`;
}

function renderSearch(v) {
  v.innerHTML = `
    <div class="pad">
      <p style="color:var(--dim);margin-bottom:22px;">Press Enter to search…</p>
      <div class="ring" id="s-ring"></div>
      <div class="grid"  id="s-grid">${S.db.map(s => cardHtml(s)).join('')}</div>
    </div>`;
}

async function doSearch(q) {
  if (!q.trim()) return;
  const ring = document.getElementById('s-ring');
  const grid = document.getElementById('s-grid');
  if (!grid) return;
  if (ring) ring.style.display = 'block';

  const local  = SEED.filter(s => s.title.toLowerCase().includes(q.toLowerCase()) || s.artist.toLowerCase().includes(q.toLowerCase()));
  const remote = await itunesSearch(q);
  const merged = [...local, ...remote];

  merged.forEach(s => { if (!S.db.find(x => x.id === s.id)) S.db.push(s); });

  if (ring) ring.style.display = 'none';
  grid.innerHTML = merged.length ? merged.map(s => cardHtml(s)).join('') : `<p style="color:var(--dim)">Nothing found.</p>`;
}

async function renderArtist(v, name) {
  const remote = await itunesSearch(name, 20);
  const local  = SEED.filter(s => s.artist === name);
  const tracks = [...local, ...remote];
  const cover  = tracks[0]?.cover || '';

  v.innerHTML = `
    <div class="hero">
      <div class="hero-bg" style="background-image:url('${cover}')"></div>
      <div class="hero-overlay"></div>
      <div class="hero-art round" style="${cover ? `background-image:url('${cover}')` : ''}">
        ${cover ? '' : '<i class="fas fa-user" style="font-size:52px;color:var(--dim)"></i>'}
      </div>
      <div class="hero-info">
        <div class="hero-type">
          Verified Artist
          <span class="badge">
            <i class="fas fa-certificate circle"></i>
            <i class="fas fa-check check"></i>
          </span>
        </div>
        <div class="hero-title">${name}</div>
        <div class="hero-sub">${tracks.length.toLocaleString()} tracks</div>
      </div>
    </div>
    <div class="pad">
      <button class="big-play" onclick='playCtx(${jss(tracks)})'><i class="fas fa-play"></i></button>
      ${tableHtml(tracks)}
    </div>`;
}

function renderPlaylist(v, meta, tracks) {
  const artStyle = meta.isLiked
    ? 'background:linear-gradient(135deg,#5a0000,#180000);'
    : 'background:var(--raised);';
  const icon = meta.isLiked
    ? '<i class="fas fa-heart" style="color:var(--red)"></i>'
    : '<i class="fas fa-music" style="color:var(--dim)"></i>';

  v.innerHTML = `
    <div class="hero">
      <div class="hero-overlay" style="background:linear-gradient(to bottom,rgba(8,8,8,0),var(--surface));position:absolute;inset:0;"></div>
      <div class="hero-art" style="${artStyle} display:flex;align-items:center;justify-content:center;font-size:58px;">${icon}</div>
      <div class="hero-info">
        <div class="hero-type">Playlist</div>
        <div class="hero-title">${meta.name}</div>
        <div class="hero-sub">${tracks.length} songs</div>
      </div>
    </div>
    <div class="pad">
      <button class="big-play" onclick='playCtx(${jss(tracks)})'><i class="fas fa-play"></i></button>
      ${tableHtml(tracks)}
    </div>`;
}

// ── html builders ─────────────────────────────────────────────────────────────
function cardHtml(s) {
  if (s._artistNav) {
    return `<div class="card" onclick="nav('artist','${s._artistNav.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
      <div class="card-img circle" style="background-image:url('${s.cover}')">
        <div class="card-play"><i class="fas fa-play"></i></div>
      </div>
      <div class="card-title">${s.title}</div>
      <div class="card-sub">Artist</div>
    </div>`;
  }
  const enc = encodeURIComponent(JSON.stringify(s));
  return `<div class="card"
    onclick="playSingle(JSON.parse(decodeURIComponent('${enc}')))"
    oncontextmenu="openCtx(event,'${s.id}',JSON.parse(decodeURIComponent('${enc}')))">
    <div class="card-img" style="background-image:url('${s.cover}')">
      <div class="card-play"><i class="fas fa-play"></i></div>
    </div>
    <div class="card-title">${s.title}</div>
    <div class="card-sub">${s.artist}</div>
  </div>`;
}

function tableHtml(tracks) {
  if (!tracks.length) return `<p style="color:var(--dim);padding:20px 0">Nothing here yet.</p>`;
  return `<table class="song-tbl">
    <thead>
      <tr>
        <th class="num-col">#</th>
        <th>Title</th>
        <th>Album</th>
        <th><i class="far fa-clock"></i></th>
      </tr>
    </thead>
    <tbody>
      ${tracks.map((s, i) => {
        const enc = encodeURIComponent(JSON.stringify(s));
        const lk  = S.liked.includes(s.id);
        return `<tr
          oncontextmenu="openCtx(event,'${s.id}',JSON.parse(decodeURIComponent('${enc}')))"
          ondblclick="playSingle(JSON.parse(decodeURIComponent('${enc}')))">
          <td class="num-col">
            <span class="row-num">${i + 1}</span>
            <i class="fas fa-play row-play" onclick="playSingle(JSON.parse(decodeURIComponent('${enc}')))"></i>
          </td>
          <td>
            <div class="s-wrap">
              <img class="s-img" src="${s.cover}" alt="">
              <div>
                <div class="s-title">${s.title}</div>
                <div class="s-artist">${s.artist}</div>
              </div>
            </div>
          </td>
          <td>${s.album || '—'}</td>
          <td>
            <div class="heart-col">
              <i class="${lk ? 'fas' : 'far'} fa-heart hrt${lk ? ' on' : ''}"
                 data-id="${s.id}"
                 onclick="toggleLike('${s.id}',JSON.parse(decodeURIComponent('${enc}')))"></i>
              ${s.duration}
            </div>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

// ── player ─────────────────────────────────────────────────────────────────────
function loadTrack(idx, autoPlay = true) {
  if (!S.queue.length) return;
  idx = ((idx % S.queue.length) + S.queue.length) % S.queue.length;
  S.qIdx = idx;
  const s = S.queue[idx];

  document.getElementById('p-title').textContent  = s.title;
  document.getElementById('p-artist').textContent = s.artist;
  document.getElementById('p-thumb').style.backgroundImage = `url('${s.cover}')`;
  refreshHeart();

  const stdBox   = document.getElementById('std-ctrl');
  const driveBox = document.getElementById('drive-box');
  const frame    = document.getElementById('drive-frame');

  if (s.isDrive) {
    stdBox.style.display   = 'none';
    driveBox.style.display = 'flex';
    frame.src = s.url;
    aud.pause();
    S.playing = false;
  } else {
    driveBox.style.display = 'none';
    frame.src = '';
    stdBox.style.display   = 'flex';
    aud.src = s.url;
    if (autoPlay) {
      aud.play().catch(() => {});
      S.playing = true;
      syncPlayIcon();
    }
  }
}

function playSingle(s) {
  const i = S.queue.findIndex(x => x.id === s.id);
  if (i !== -1) { loadTrack(i); }
  else {
    S.queue.splice(S.qIdx + 1, 0, s);
    loadTrack(S.qIdx + 1);
  }
}

function playCtx(list) {
  if (!list || !list.length) return;
  S.queue = [...list];
  loadTrack(0);
}

function togglePlay() {
  const s = S.queue[S.qIdx];
  if (s?.isDrive) return;
  if (S.playing) aud.pause(); else aud.play().catch(() => {});
  S.playing = !S.playing;
  syncPlayIcon();
}

function syncPlayIcon() {
  document.getElementById('play-ico').className = S.playing ? 'fas fa-pause' : 'fas fa-play';
}

function nextTrack() {
  if (S.shuffle) loadTrack(Math.floor(Math.random() * S.queue.length));
  else loadTrack(S.qIdx + 1);
}

function prevTrack() {
  if (aud.currentTime > 3) { aud.currentTime = 0; }
  else loadTrack(S.qIdx - 1);
}

function toggleShuffle() {
  S.shuffle = !S.shuffle;
  document.getElementById('btn-shuf').classList.toggle('on', S.shuffle);
}

function toggleLoop() {
  S.loop = !S.loop;
  document.getElementById('btn-loop').classList.toggle('on', S.loop);
}

function muteToggle() {
  aud.muted = !aud.muted;
  refreshVolIcon();
}

function refreshVolIcon() {
  const el = document.getElementById('vol-ico');
  el.className = aud.muted || aud.volume === 0
    ? 'fas fa-volume-xmark vol-icon'
    : aud.volume < 0.4
    ? 'fas fa-volume-low vol-icon'
    : 'fas fa-volume-high vol-icon';
}

aud.addEventListener('timeupdate', () => {
  if (!aud.duration || isNaN(aud.duration)) return;
  const pct = (aud.currentTime / aud.duration) * 100;
  const bar = document.getElementById('seekbar');
  if (isFinite(pct)) { bar.value = pct; fillRange(bar); }
  document.getElementById('t-now').textContent = fmtSec(aud.currentTime);
  document.getElementById('t-end').textContent = fmtSec(aud.duration);
});

aud.addEventListener('ended', () => {
  if (S.loop) { aud.currentTime = 0; aud.play(); }
  else nextTrack();
});

document.getElementById('seekbar').addEventListener('input', e => {
  if (!aud.duration || isNaN(aud.duration)) return;
  const t = (e.target.value / 100) * aud.duration;
  if (isFinite(t)) aud.currentTime = t;
  fillRange(e.target);
});

document.getElementById('volbar').addEventListener('input', e => {
  aud.volume = e.target.value;
  fillRange(e.target);
  refreshVolIcon();
});

// ── helpers ────────────────────────────────────────────────────────────────────
function uniqueArtists(list) {
  const seen = new Set();
  return list.filter(s => {
    if (seen.has(s.artist)) return false;
    seen.add(s.artist); return true;
  }).map(s => ({ name: s.artist, cover: s.cover }));
}

// safe JSON stringify for inline onclick attrs
function jss(obj) {
  return encodeURIComponent(JSON.stringify(obj));
}

// override playCtx to accept encoded string too
const _playCtx = playCtx;
window.playCtx = function(arg) {
  if (typeof arg === 'string') arg = JSON.parse(decodeURIComponent(arg));
  _playCtx(arg);
};

// ── boot ───────────────────────────────────────────────────────────────────────
async function boot() {
  // hide splash after intro animation finishes
  setTimeout(() => document.getElementById('splash').classList.add('out'), 2000);
  setTimeout(() => document.getElementById('splash').style.display = 'none', 2700);

  // prime range fills
  fillRange(document.getElementById('volbar'));

  renderSidebar();

  const hits = await itunesSearch('top hits 2024');
  S.db = [...SEED, ...hits];

  await nav('home');

  S.queue = [...S.db];
  loadTrack(0, false);
}

window.addEventListener('load', boot);

</script>
</body>
