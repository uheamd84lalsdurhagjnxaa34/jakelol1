<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NX Snap Clone - Auth</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#000; font-family: Arial, sans-serif; color:#fff; }
.center-box { background:#333; border-radius:15px; width:350px; margin:50px auto; padding:20px; text-align:center; }
.logo { font-family:'VT323', monospace; font-size:60px; color:#fff; text-shadow:0 0 20px #fff,0 0 40px #fff; margin-bottom:20px; }
input { width:80%; padding:10px; margin:10px 0; border-radius:25px; border:none; background:#222; color:#fff; }
input::placeholder { color:#fff; }
button { padding:10px 20px; border:none; border-radius:8px; background:#fff; color:#000; cursor:pointer; margin:5px; }
</style>
</head>
<body>

<div id="auth-box" class="center-box">
  <div class="logo">NX</div>
  <input id="email" placeholder="Email:" type="email">
  <input id="password" placeholder="Password:" type="password">
  <input id="username" placeholder="Name:">
  <input type="file" id="pfpInput">
  <button id="signupBtn">Sign Up</button>
  <button id="loginBtn">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAjl1EACzpM8eFGkY2JLIXkuL2xWMcQHZ8",
  authDomain: "snapchatr.firebaseapp.com",
  projectId: "snapchatr",
  storageBucket: "snapchatr.firebasestorage.app",
  messagingSenderId: "113601547876",
  appId: "1:113601547876:web:4d31a82e4d960944d21971"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

document.getElementById("signupBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;
  const pfpFile = document.getElementById("pfpInput").files[0];

  if (!email || !password || !username) { alert("Fill all fields!"); return; }

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    let pfpUrl = "";
    if (pfpFile) {
      const storageRef = ref(storage, `pfps/${uid}/${pfpFile.name}`);
      await uploadBytes(storageRef, pfpFile);
      pfpUrl = await getDownloadURL(storageRef);
    }

    await setDoc(doc(db, "users", uid), {
      email: email,
      username: username,
      profilePic: pfpUrl,
      friends: [],
      admin: email === "baktashanwari234@gmail.com",
      banned: false,
      createdAt: serverTimestamp()
    });

    alert("Signup successful!"); 
    // redirect to chat page here later
  } catch (e) { alert(e.message); }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;
    const userDoc = await getDoc(doc(db, "users", uid));
    if (userDoc.exists() && userDoc.data().banned) { alert("You are banned."); return; }
    alert("Login successful!");
    // redirect to chat page here later
  } catch(e) { alert(e.message); }
});
</script>
</body>
</html>
