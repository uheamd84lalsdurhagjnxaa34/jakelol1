<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NX Snapchat Clone - Full Version</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#000; font-family: Arial, sans-serif; color:#fff; }
.center-box { background:#333; border-radius:15px; width:350px; margin:50px auto; padding:20px; text-align:center; }
.logo { font-family:'VT323', monospace; font-size:60px; color:#fff; text-shadow:0 0 20px #fff,0 0 40px #fff; margin-bottom:20px; }
input { width:80%; padding:10px; margin:10px 0; border-radius:25px; border:none; background:#222; color:#fff; }
input::placeholder { color:#fff; }
button { padding:10px 20px; border:none; border-radius:8px; background:#fff; color:#000; cursor:pointer; margin:5px; }
#chat-container { display:flex; height:90vh; }
#friends-list { width:25%; background:#111; overflow-y:auto; padding:10px; }
#chat-window { width:75%; display:flex; flex-direction:column; background:#000; position:relative; }
#messages { flex:1; overflow-y:auto; padding:10px; }
.message { margin:5px 0; padding:5px 10px; border-radius:10px; max-width:70%; word-wrap:break-word; }
.message.self { background:#444; align-self:flex-end; }
.message.other { background:#222; align-self:flex-start; }
.message img { max-width:150px; border-radius:10px; }
#message-input { display:flex; justify-content:flex-end; padding:10px; }
#message-input input { flex:1; border-radius:20px; padding:10px; margin-right:10px; background:#222; color:#fff; border:none; }
#camera-preview { width:100%; max-height:300px; object-fit:cover; margin-top:10px; border-radius:10px; }
#notifications { position:fixed; top:10px; right:10px; width:250px; z-index:1000; }
.notification { background:#333; border-radius:10px; margin-bottom:5px; padding:10px; display:flex; align-items:center; }
.notification img { width:30px; height:30px; border-radius:50%; margin-right:10px; }
</style>
</head>
<body>

<!-- Sign Up / Login -->
<div id="auth-box" class="center-box">
  <div class="logo">NX</div>
  <input id="email" placeholder="Email:" type="email">
  <input id="password" placeholder="Password:" type="password">
  <input id="username" placeholder="Name:" style="display:none">
  <button id="signup-btn">Sign Up</button>
  <button id="login-btn">Login</button>
</div>

<!-- Chat Container -->
<div id="chat-container" style="display:none;">
  <div id="friends-list">
    <input id="friend-search" placeholder="Search friends">
    <div id="friends"></div>
    <button id="create-gc">Create GC</button>
  </div>
  <div id="chat-window">
    <div id="messages"></div>
    <div id="message-input">
      <input id="messageText" placeholder="Type a message">
      <input type="file" id="imageFile">
      <button id="sendBtn">Send</button>
      <button id="snapBtn">Snap</button>
    </div>
  </div>
</div>

<div id="notifications"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAjl1EACzpM8eFGkY2JLIXkuL2xWMcQHZ8",
  authDomain: "snapchatr.firebaseapp.com",
  projectId: "snapchatr",
  storageBucket: "snapchatr.firebasestorage.app",
  messagingSenderId: "113601547876",
  appId: "1:113601547876:web:4d31a82e4d960944d21971"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let currentChatId = null;

// -------------------- Auth --------------------
const authBox = document.getElementById("auth-box");
const chatContainer = document.getElementById("chat-container");

document.getElementById("signup-btn").addEventListener("click", async()=>{
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value || "Anonymous";
  try {
    const userCredential = await createUserWithEmailAndPassword(auth,email,password);
    currentUser = userCredential.user;
    await setDoc(doc(db,"users",currentUser.uid),{
      email: email,
      username: username,
      profilePic: "",
      friends: [],
      admin: email==="baktashanwari234@gmail.com",
      banned: false,
      createdAt: serverTimestamp(),
      gcs: []
    });
    showChat();
  } catch(e){ alert(e.message); }
});

document.getElementById("login-btn").addEventListener("click", async()=>{
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try {
    const userCredential = await signInWithEmailAndPassword(auth,email,password);
    currentUser = userCredential.user;
    const userDoc = await getDoc(doc(db,"users",currentUser.uid));
    if(userDoc.exists() && userDoc.data().banned) { alert("You are banned."); return; }
    showChat();
  } catch(e){ alert(e.message); }
});

function showChat(){
  authBox.style.display="none";
  chatContainer.style.display="flex";
  loadFriends();
}

// -------------------- Friends --------------------
async function loadFriends(){
  const friendsDiv = document.getElementById("friends");
  friendsDiv.innerHTML="";
  const userDoc = await getDoc(doc(db,"users",currentUser.uid));
  if(!userDoc.exists()) return;
  const friends = userDoc.data().friends || [];
  for(const uid of friends){
    const fDoc = await getDoc(doc(db,"users",uid));
    if(fDoc.exists()){
      const div = document.createElement("div");
      div.textContent = fDoc.data().username;
      div.style.cursor="pointer";
      div.onclick=()=>startChat(uid);
      friendsDiv.appendChild(div);
    }
  }
}

// -------------------- Chat --------------------
async function startChat(friendUid){
  currentChatId = [currentUser.uid,friendUid].sort().join("_");
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML="";
  const messagesRef = collection(db,"chats",currentChatId,"messages");
  const q = query(messagesRef, orderBy("timestamp","asc"));
  onSnapshot(q,(snapshot)=>{
    messagesDiv.innerHTML="";
    snapshot.forEach(doc=>{
      const msg = doc.data();
      const div = document.createElement("div");
      div.className="message " + (msg.senderId===currentUser.uid?"self":"other");
      div.innerHTML = msg.text ? `<b>${msg.senderId}:</b> ${msg.text}` : `<b>${msg.senderId}:</b> <img src="${msg.imageUrl}">`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop=messagesDiv.scrollHeight;
    });
  });
}

// -------------------- Send Messages --------------------
document.getElementById("sendBtn").addEventListener("click", async()=>{
  const text = document.getElementById("messageText").value;
  if(!text || !currentChatId) return;
  const messagesRef = collection(db,"chats",currentChatId,"messages");
  await addDoc(messagesRef,{
    senderId: currentUser.uid,
    text:text,
    imageUrl:"",
    timestamp:serverTimestamp(),
    viewed:false
  });
  document.getElementById("messageText").value="";
});

// -------------------- Send Image --------------------
document.getElementById("imageFile").addEventListener("change", async(e)=>{
  const file = e.target.files[0];
  if(!file || !currentChatId) return;
  const storageRef = ref(storage,`snaps/${currentUser.uid}/${file.name}`);
  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);
  const messagesRef = collection(db,"chats",currentChatId,"messages");
  await addDoc(messagesRef,{
    senderId: currentUser.uid,
    text:"",
    imageUrl:url,
    timestamp:serverTimestamp(),
    viewed:false
  });
});

// -------------------- Notifications --------------------
function showNotification(fromName,fromPFP,message){
  const nDiv = document.createElement("div");
  nDiv.className="notification";
  nDiv.innerHTML=`<img src="${fromPFP}"><div><b>${fromName}:</b> ${message}</div>`;
  document.getElementById("notifications").appendChild(nDiv);
  setTimeout(()=>nDiv.remove(),5000);
}

// -------------------- TODO: Full GC, camera filters, permanent links, max 500 members --------------------

// This HTML is ready to host on GitHub Pages for full Firebase integration.

</script>
</body>
</html>
